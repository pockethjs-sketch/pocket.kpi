
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓컴퍼니 성과관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#0955f9; --brand-d:#0747d6; --brand-l:#4d8bff; --lime:#84f94e;
    --ink:#0e141e; --gray:#5b6271; --gray-l:#878fa1; --line:#ececf1;
    --bg:#f5f7fb; --bg2:#eef2fb; --white:#fff; --chip:#eef2f7;
    --text:#0e141e; --muted:#5b6271; --muted-2:#9aa3b2;
    --panel:#ffffff; --panel-2:#f7f9fc;
    --border:#ececf1; --border-2:#dfe4ee;
    --blue:#0955f9; --green:#16b364; --gold:#f5a524; --red:#ef4444; --purple:#8b5cf6; --cyan:#06b6d4; --pink:#ec4899; --orange:#f97316;
    --radius:18px; --radius-sm:10px;
    --shadow:0 10px 30px rgba(15,23,42,.05),0 2px 8px rgba(15,23,42,.03); --shadow-l:0 8px 22px rgba(9,85,249,.07);
    --font:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,'Malgun Gothic',sans-serif;
    --pop:'Poppins','Pretendard',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font); color:var(--ink); font-size:14px; line-height:1.5; letter-spacing:-.02em;
    -webkit-font-smoothing:antialiased;
    background:linear-gradient(180deg,#e7f1fd 0%,#eef4fe 220px,var(--bg) 480px); background-color:var(--bg);
    background-attachment:fixed; min-height:100vh; padding-bottom:60px;
  }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d3dae6;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#bcc5d6}
  ::-webkit-scrollbar-track{background:transparent}
  a{color:var(--brand)}
  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:50; backdrop-filter:blur(10px);
    background:rgba(255,255,255,.88);
    border-bottom:1px solid var(--line); box-shadow:0 1px 0 rgba(0,0,0,.03),0 6px 18px rgba(9,85,249,.04);
    padding:13px 24px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .logo{font-family:var(--pop);font-weight:700;font-size:18px;letter-spacing:-.02em;color:var(--ink);display:flex;align-items:center}
  .logo b{color:var(--lime);font-weight:800;-webkit-text-stroke:.6px #4fc41f;margin:0 1px}
  .brand .tag{font-size:11px;font-weight:700;color:var(--brand);background:#e9f0ff;border:1px solid #d4e2ff;padding:3px 10px;border-radius:100px}
  .brand .sub{font-size:11.5px;color:var(--gray);font-weight:500}
  .grow{flex:1}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .btn{
    border:1px solid var(--border-2); background:#fff; color:var(--ink);
    padding:8px 13px; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer;
    font-family:inherit; display:inline-flex; align-items:center; gap:6px; transition:.15s;
  }
  .btn:hover{background:var(--bg2);border-color:#cdd6e6;transform:translateY(-1px)}
  .btn.primary{background:var(--brand);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(9,85,249,.25)}
  .btn.primary:hover{background:var(--brand-d)}
  .btn.ghost{background:#fff}
  .btn.danger:hover{background:#fff1f1;border-color:#f6bcbc;color:var(--red)}
  .save-dot{font-size:11px;color:#0f9b52;display:flex;align-items:center;gap:5px;font-weight:600}
  .save-dot i{width:7px;height:7px;border-radius:50%;background:#16b364;box-shadow:0 0 8px rgba(22,179,100,.55)}
  /* ---------- nav ---------- */
  nav{display:flex;gap:6px;padding:14px 24px 0;flex-wrap:wrap}
  .tab{
    padding:10px 16px;border-radius:11px 11px 0 0;cursor:pointer;font-weight:700;font-size:13.5px;
    color:var(--gray);border:1px solid transparent;border-bottom:none;display:flex;align-items:center;gap:7px;transition:.15s
  }
  .tab:hover{color:var(--ink);background:rgba(255,255,255,.6)}
  .tab.active{color:var(--brand);background:#fff;border-color:var(--border);box-shadow:0 -3px 10px rgba(9,85,249,.05)}
  main{padding:26px 30px 48px;max-width:1480px;margin:0 auto}
  /* ---------- cards ---------- */
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
  .card h3{font-size:14.5px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;color:var(--ink);letter-spacing:-.01em}
  .card h3 .muted{color:var(--gray-l);font-weight:600;font-size:12px;margin-left:auto}
  .grid{display:grid;gap:20px}
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(184px,1fr))}
  .stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow-l);transition:.18s}
  .stat:hover{box-shadow:0 14px 32px rgba(9,85,249,.10);transform:translateY(-2px);border-color:#dde6f3}
  .stat::after{content:'';position:absolute;right:-26px;top:-26px;width:84px;height:84px;border-radius:50%;background:var(--accent,var(--brand));opacity:.07}
  .stat .st-ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:18px;margin-bottom:15px;background:#f0f5ff;background:color-mix(in srgb,var(--accent,var(--brand)) 13%,#fff)}
  .stat .label{font-size:12px;color:var(--gray);font-weight:600;margin-bottom:6px}
  .stat .value{font-family:var(--pop);font-size:26px;font-weight:700;letter-spacing:-.6px;color:var(--ink);line-height:1.12}
  .stat .delta{font-size:11.5px;color:var(--gray-l);margin-top:8px;font-weight:500}
  .two-col{grid-template-columns:1fr 1fr}
  .three-col{grid-template-columns:2fr 1fr 1fr}
  @media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}
  /* ---------- bar charts ---------- */
  .hbars{display:flex;flex-direction:column;gap:15px}
  .hbar-row{display:flex;flex-direction:column;gap:7px;font-size:12.5px}
  .hbar-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .hbar-label{color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
  .hbar-val{font-family:var(--pop);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--brand)}
  .hbar-track{height:9px;background:#eef1f6;border-radius:6px;overflow:hidden}
  .hbar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1);min-width:3px}
  /* vertical bars */
  .vbars{display:flex;gap:16px;align-items:flex-end;height:200px;padding-top:18px}
  .vbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .vbar{width:70%;max-width:46px;background:linear-gradient(180deg,var(--brand-l),var(--brand));border-radius:7px 7px 0 0;position:relative;transition:height .6s cubic-bezier(.2,.8,.2,1)}
  .vbar .v-top{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;white-space:nowrap;color:var(--ink);font-family:var(--pop)}
  .vbar-x{font-size:11px;color:var(--gray);white-space:nowrap;font-weight:500}
  /* donut */
  .donut-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .donut{width:128px;height:128px;border-radius:50%;flex-shrink:0;position:relative;box-shadow:0 4px 14px rgba(17,22,31,.06)}
  .donut::after{content:'';position:absolute;inset:25px;border-radius:50%;background:#fff}
  .donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;text-align:center}
  .donut .center b{font-family:var(--pop);font-size:21px;font-weight:700;color:var(--ink);line-height:1}
  .donut .center span{font-size:10.5px;color:var(--gray-l);margin-top:2px}
  .legend{display:flex;flex-direction:column;gap:11px;font-size:12.5px;min-width:150px}
  .legend .li{display:flex;align-items:center;gap:8px}
  .legend .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .legend .ln{color:var(--gray)} .legend .lv{font-weight:700;margin-left:auto;padding-left:14px;color:var(--ink);font-family:var(--pop);white-space:nowrap}
  /* month filter bar */
  .month-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 16px;box-shadow:var(--shadow-l)}
  .month-bar .mb-label{font-size:12.5px;font-weight:700;color:var(--gray);margin-right:4px}
  .mpill{border:1px solid var(--border-2);background:#fff;color:var(--gray);padding:7px 15px;border-radius:100px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
  .mpill:hover{border-color:var(--brand);color:var(--brand)}
  .mpill.active{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(9,85,249,.22)}
  .period-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .period-head .ph-eyebrow{font-size:12px;font-weight:700;color:var(--brand);background:#e9f0ff;border:1px solid #d4e2ff;padding:4px 11px;border-radius:100px}
  .period-head .ph-period{font-family:var(--pop);font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.4px}
  .period-head .ph-cnt{font-size:12.5px;color:var(--gray);font-weight:600;margin-left:auto}
  .ctype-toggle{display:inline-flex;gap:4px;background:#eef2f7;border-radius:100px;padding:3px}
  .new-badge{display:inline-flex;align-items:center;font-size:12px;font-weight:800;color:var(--brand);background:#e9f0ff;border:1px solid #d4e2ff;border-radius:100px;padding:5px 12px}
  .ct-btn{border:none;background:transparent;color:var(--gray);font-family:inherit;font-size:12px;font-weight:700;padding:5px 14px;border-radius:100px;cursor:pointer;transition:.12s}
  .ct-btn:hover{color:var(--ink)}
  .ct-btn.on{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(15,23,42,.10)}
  .kpi-card{position:relative}
  .kpi-tr{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .kpi-edit{background:#eef2f7;color:var(--gray);border:1px solid var(--border-2);padding:6px 10px;border-radius:100px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:.15s;line-height:1;white-space:nowrap}
  .kpi-edit:hover{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 5px 14px rgba(9,85,249,.3);transform:translateY(-1px)}
  .sv-form{display:flex;flex-direction:column;gap:14px}
  .sv-f{display:flex;flex-direction:column;gap:5px}
  .sv-f label{font-size:12px;font-weight:700;color:var(--gray)}
  .sv-f .inp{width:100%}
  .sv-sub{font-weight:600;color:var(--gray-l);font-size:11px}
  textarea.sv-note{resize:vertical;min-height:260px;line-height:1.6;font-family:inherit}
  .sv-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
  .sv-hint{font-size:11.5px;color:var(--gray-l);line-height:1.6;background:var(--bg);border-radius:10px;padding:10px 12px}
  thead th.num{text-align:right}
  thead th.center{text-align:center}
  .hbar-click{cursor:pointer}
  .hbar-click:hover .hbar-label{color:var(--brand);text-decoration:underline}
  .ct-amt{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:14px;padding-top:13px;border-top:1px solid var(--border);font-size:12.5px;font-weight:700;color:var(--ink)}
  .ct-amt span{display:inline-flex;align-items:center}
  .ct-amt i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px}
  .cal-click{cursor:pointer;transition:.12s}
  .cal-click:hover{border-color:var(--brand);box-shadow:0 4px 12px rgba(9,85,249,.10)}
  /* clickable stat + breakdown modal */
  .stat.clickable{cursor:pointer}
  .stat .st-go{position:absolute;top:14px;right:15px;font-size:16px;font-weight:800;color:var(--gray-l);opacity:0;transition:.15s;z-index:2}
  .stat.clickable:hover .st-go{opacity:1;color:var(--brand)}
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(14,20,30,.45);display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.hide{display:none}
  .modal-card{background:#fff;border-radius:18px;box-shadow:0 30px 80px rgba(14,20,30,.32);width:100%;max-width:720px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:17px 22px;border-bottom:1px solid var(--border)}
  .modal-head h3{font-size:16px;font-weight:800;color:var(--ink)}
  .modal-x{border:none;background:#f0f3f8;width:30px;height:30px;border-radius:8px;cursor:pointer;color:var(--gray);font-size:12px;font-weight:700;flex-shrink:0}
  .modal-x:hover{background:#e2e8f2;color:var(--ink)}
  .modal-body{padding:18px 22px 22px;overflow-y:auto}
  .bd-desc{font-size:12.5px;color:var(--gray);line-height:1.6;margin-bottom:12px}
  .bd-desc b{color:var(--ink)}
  .bd-note{background:#f4f8ff;border:1px solid #d6e4ff;border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .bd-note-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;color:var(--brand);margin-bottom:8px}
  .bd-copy{margin-left:auto;border:1px solid var(--border-2);background:#fff;color:var(--ink);font-family:inherit;font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;cursor:pointer;transition:.12s}
  .bd-copy:hover{border-color:var(--brand);color:var(--brand)}
  .bd-note-body{margin:0;white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:12.5px;line-height:1.65;color:var(--ink)}
  .bd-pill{display:inline-block;background:#e9f0ff;color:var(--brand);font-weight:700;padding:2px 9px;border-radius:100px;font-size:11.5px;margin-right:4px}
  .bd-big{font-family:var(--pop);font-size:30px;font-weight:700;color:var(--brand);letter-spacing:-.5px;margin-bottom:3px}
  .bd-count{font-size:11.5px;color:var(--gray-l);margin-bottom:14px;font-weight:600}
  .bd-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:0 26px}
  .bd-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 2px;border-bottom:1px solid #f1f3f7;font-size:13px}
  .bd-l{color:var(--ink);font-weight:600;display:flex;flex-direction:column;gap:2px;min-width:0}
  .bd-l .bd-sub{font-size:11px;color:var(--gray-l);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bd-r{font-family:var(--pop);font-weight:700;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums}
  .bd-sec{margin-top:18px}
  .bd-sec-h{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:9px}
  .bd-sec-h .c{font-size:11.5px;font-weight:700;color:var(--gray);background:var(--chip);padding:2px 9px;border-radius:100px}
  .bd-sec-cols{display:flex;justify-content:space-between;font-size:10.5px;color:var(--gray-l);font-weight:600;padding:0 2px 5px}
  .bd-empty{font-size:12px;color:var(--gray-l);padding:11px 2px;border-top:1px solid var(--border)}
  .bd-x{color:var(--gray-l);font-size:10px;font-weight:600}
  .kpi-card.clickable{cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s}
  .kpi-card.clickable:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(9,85,249,.10);border-color:#dde6f3}
  .active-period{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--brand);background:#e9f0ff;border:1px solid #d4e2ff;padding:6px 11px;border-radius:100px}
  .active-period .ap-x{cursor:pointer;opacity:.7;font-weight:800;padding:0 2px}
  .active-period .ap-x:hover{opacity:1}
  .add-form{background:linear-gradient(135deg,#eef4ff,#f4f9ff);border:1px solid #d4e2ff;border-radius:14px;padding:14px 16px;margin-bottom:14px;display:block}
  .af-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .af-row .inp{padding:8px 10px;font-size:13px}
  .af-row .af-name{flex:1;min-width:130px}
  .af-row .af-svc{min-width:150px}
  .af-row .af-amount{width:96px}
  .af-rowx{border:none;background:#fff1f1;color:#c2410c;width:30px;height:34px;border-radius:8px;cursor:pointer;flex-shrink:0;font-weight:700}
  .af-rowx:hover{background:#ffe2e2;color:var(--red)}
  .af-foot{display:flex;align-items:center;gap:10px;margin-top:4px;border-top:1px dashed #c9ddff;padding-top:12px}
  .af-plus{border:1px dashed var(--brand);background:#eef4ff;color:var(--brand);font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:9px;cursor:pointer;font-family:inherit}
  .af-plus:hover{background:#dfeaff}
  .add-form .af-field{display:flex;flex-direction:column;gap:5px}
  .add-form .af-field label{font-size:10.5px;font-weight:700;color:var(--gray)}
  .add-form .af-field .inp{padding:7px 10px}
  .add-form .af-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
  .af-msg{font-size:12px;font-weight:700;color:#0f9b52;opacity:0;transition:opacity .3s;white-space:nowrap}
  .filter-panel{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;padding:12px 15px;margin-bottom:14px;background:#f7f9fc;border:1px solid var(--border);border-radius:12px}
  .fp-group{display:flex;flex-wrap:wrap;align-items:center;gap:7px}
  .fp-label{font-size:11px;font-weight:800;color:var(--gray);margin-right:3px}
  .fp-chk{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--gray);background:#fff;border:1px solid var(--border-2);padding:5px 11px;border-radius:100px;cursor:pointer;transition:.12s}
  .fp-chk:hover{border-color:#bcd4ff}
  .fp-chk input{accent-color:var(--brand);cursor:pointer;margin:0;width:14px;height:14px}
  .fp-chk:has(input:checked){background:#e9f0ff;border-color:#bcd4ff;color:var(--brand)}
  .stat.clickable:focus-visible,.kpi-card.clickable:focus-visible,.modal-x:focus-visible,.mpill:focus-visible,.active-period .ap-x:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  /* ---------- table ---------- */
  .toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .inp,select.inp{background:#fff;border:1px solid var(--border-2);color:var(--ink);padding:8px 11px;border-radius:9px;font-family:inherit;font-size:13px;outline:none;transition:.15s}
  .inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(9,85,249,.12)}
  select.inp{cursor:pointer}
  .search{min-width:200px;flex:1;max-width:300px}
  .chip{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block;background:var(--chip)}
  .pill-cnt{font-size:11.5px;color:var(--gray);font-weight:600}
  .tbl-wrap{overflow:auto;border-radius:12px;border:1px solid var(--border);max-height:calc(100vh - 290px);background:#fff}
  table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px}
  thead th{position:sticky;top:0;z-index:3;background:#f4f7fc;color:var(--gray);font-weight:700;text-align:left;
    padding:11px 12px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
  thead th:hover{color:var(--ink)}
  thead th .arr{opacity:.9;font-size:10px;color:var(--brand)}
  tbody td{padding:9px 12px;border-bottom:1px solid #f1f3f7;white-space:nowrap;cursor:text;max-width:230px;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  tbody tr:hover{background:#f7f9fd}
  tbody td.num,tbody td.won{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--pop);font-weight:500}
  tbody td.center{text-align:center;cursor:pointer}
  td .cell-input,td .cell-select{width:100%;background:#fff;border:1px solid var(--brand);color:var(--ink);padding:5px 7px;border-radius:6px;font-family:inherit;font-size:12.5px;outline:none}

function saveOutbox(){ try{ localStorage.setItem('pocket_perf_outbox', JSON.stringify(outbox)); }catch(e){} }
function outboxN(){ return Object.keys(outbox).length; }
function setSync(s){ const d=document.getElementById('saveDot'); if(!d||!CLOUD)return; d.style.opacity='1'; const n=outboxN();
  if(s==='load'){ d.innerHTML='<i style="background:#f5a524;box-shadow:none"></i>불러오는 중…'; return; }
  if(s==='sync'){ d.innerHTML='<i style="background:#f5a524;box-shadow:none"></i>동기화 중…'; return; }

  d.innerHTML='<i></i>☁ 동기화됨';
}
function _s(v){ return v==null?'':String(v); }
function _b(v){ return v===true||v===1||v==='TRUE'||v==='true'||v==='Yes'||v==='Y'; }
function newId(){ return 'd'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function normDeal(d){ return { _id:String(d._id||newId()), name:_s(d.name), rep:_s(d.rep), service:_s(d.service), prob:_s(d.prob), ctype:_s(d.ctype), amount:Number(d.amount)||0, paid:Number(d.paid)||0, contract:_b(d.contract), ccount:Number(d.ccount)||0, meetings:Number(d.meetings)||0, date:_s(d.date), push:_b(d.push) }; }
function newSvcId(){ return 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function normSvc(s){ var t=_s(s.target); var m=t.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(m)t=(+m[2])+'/'+(+m[3]); return { _id:_s(s._id)||newSvcId(), name:_s(s.name), target:t, price:_s(s.price), rr:_s(s.rr), note:_s(s.note), edited:_s(s.edited) }; }
function cloudGet(){ return fetch(SHEET_URL+'?token='+encodeURIComponent(SHEET_TOKEN)).then(r=>{ if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); }); }
function cloudPost(p){ p.token=SHEET_TOKEN; return fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)}).then(r=>{ if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); }); }
function pushDeal(d){ if(!CLOUD)return; outbox[d._id]={op:'up',deal:JSON.parse(JSON.stringify(d))}; saveOutbox(); flushOutbox(); }
function pushDel(id){ if(!CLOUD)return; outbox[id]={op:'del'}; saveOutbox(); flushOutbox(); }
function pushLog(l){ if(!CLOUD||!l)return; cloudPost({action:'appendLog',log:l}).catch(e=>console.warn('log sync fail',e)); }
function pushService(s){ if(!CLOUD)return; outbox[s._id]={op:'svc',service:JSON.parse(JSON.stringify(s))}; saveOutbox(); flushOutbox(); }
function pushSvcDel(id){ if(!CLOUD)return; outbox[id]={op:'svcdel'}; saveOutbox(); flushOutbox(); }
async function flushOutbox(){
  if(!CLOUD||_flushing)return;
  if(!outboxN()){ setSync('ok'); return; }
  if(navigator&&navigator.onLine===false){ setSync('offline'); return; }
  _flushing=true; setSync('sync');
  try{
    for(const id of Object.keys(outbox)){
      const e=outbox[id]; let o;
      try{ o = e.op==='del' ? await cloudPost({action:'deleteDeal',id:id}) : e.op==='svcdel' ? await cloudPost({action:'deleteService',id:id}) : e.op==='svc' ? await cloudPost({action:'upsertService',service:e.service}) : await cloudPost({action:'upsertDeal',deal:e.deal}); }
      catch(err){ break; }
      if(o&&o.ok){ delete outbox[id]; saveOutbox(); } else break;
    }
  } finally { _flushing=false; setSync(outboxN()?'pending':'ok'); }
}
function applyOutbox(){ for(const id in outbox){ const e=outbox[id];
  if(e.op==='del'){ state.deals=state.deals.filter(d=>d._id!==id); }
  else if(e.op==='svcdel'){ state.services=state.services.filter(s=>s._id!==id); }
  else if(e.op==='svc'&&e.service){ const i=state.services.findIndex(s=>s._id===id); if(i>=0)state.services[i]=e.service; else state.services.push(e.service); }
  else if(e.deal){ const i=state.deals.findIndex(d=>d._id===id); if(i>=0)state.deals[i]=e.deal; else state.deals.unshift(e.deal); } } }
async function cloudLoad(){
  if(!CLOUD)return;
  setSync('load');
  try{
    const o=await cloudGet();
    if(o.error) throw new Error(o.error);
    state.deals=(o.deals||[]).map(normDeal);
    state.services=(o.services||[]).map(normSvc);
    state.logs=(o.logs||[]).map(l=>({ts:_s(l.ts),user:_s(l.user),action:_s(l.action),target:_s(l.target),detail:_s(l.detail)}))
                 .sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
    _lastLoadFail=false;
    applyOutbox();   /* 아직 시트에 못 보낸 로컬 변경을 시트 최신본 위에 보존 */
    save();
    flushOutbox();   /* 미동기화분 재전송 시도 */
  }catch(e){ _lastLoadFail=true; setSync('err'); console.warn('cloudLoad fail',e); }
}
function cloudRefresh(){ if(CLOUD){ cloudLoad().then(()=>render()); } else { render(); } }
function syncNow(){ if(!CLOUD){ save(); render(); return; } flushOutbox().then(()=>cloudRefresh()); }
if(CLOUD){
  window.addEventListener('online', flushOutbox);

}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function svcOrder(a,b){ return svcNum(a)-svcNum(b) || String(a).localeCompare(String(b),'ko'); }

/* service rollups from deals (replicates Notion rollup + 수식) */
function rollup(deals){
  deals=deals||state.deals;
  const m={};
  state.services.forEach(s=>{ m[s.name]={svc:s,amount:0,camount:0,paid:0,ccount:0,meetings:0,deals:0}; });
  deals.forEach(d=>{
    const k=d.service; if(!k||!m[k])return;
    m[k].amount+=Number(d.amount)||0; m[k].paid+=Number(d.paid)||0;
    if(d.contract)m[k].camount+=Number(d.amount)||0;
    if(d.ctype==='신규'){ m[k].ccount+=Number(d.ccount)||0; m[k].meetings+=1; }  /* 미팅=신규 딜 1건당 1 · 기존/미지정 제외 */
    m[k].deals++;
  });
  Object.values(m).forEach(r=>{ r.conv = r.meetings? r.ccount/r.meetings : 0; });
  return m;
}
function totals(deals){
  deals=deals||state.deals;
  const t={amount:0,paid:0,camount:0,ccount:0,meetings:0,n:deals.length,신규:0,기존:0};
  deals.forEach(d=>{ t.amount+=Number(d.amount)||0; t.paid+=Number(d.paid)||0; if(d.contract)t.camount+=Number(d.amount)||0; if(d.ctype==='신규'){ t.ccount+=Number(d.ccount)||0; t.meetings+=1; } if(d.ctype==='신규')t.신규++; else if(d.ctype==='기존')t.기존++; });
  t.conv = t.meetings? t.ccount/t.meetings : 0;
  return t;
}

function hbars(data,fmt){
  const max=Math.max(1,...data.map(d=>d.value));
  return `<div class="hbars">`+data.map(d=>
    `<div class="hbar-row${d.onclick?' hbar-click':''}"${d.onclick?` onclick="${d.onclick}"`:''}><div class="hbar-top"><div class="hbar-label" title="${esc(d.label)}">${esc(d.label)}</div><div class="hbar-val">${fmt(d.value)}</div></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${d.value/max*100}%;background:${d.color||'var(--brand)'}"></div></div></div>`).join('')+`</div>`;
}
function donut(data,centerVal,centerLbl){
  const tot=data.reduce((a,b)=>a+b.value,0)||1; let acc=0; const segs=[];
  data.forEach((d,i)=>{ const from=acc/tot*100; acc+=d.value; const to=acc/tot*100; segs.push(`${d.color} ${from}% ${to}%`); });
  return `<div class="donut-wrap">
    <div class="donut" style="background:conic-gradient(${segs.join(',')})"><div class="center"><b>${centerVal}</b><span>${centerLbl}</span></div></div>
    <div class="legend">${data.map(d=>`<div class="li"><span class="sw" style="background:${d.color}"></span><span class="ln">${esc(d.label)}</span><span class="lv">${d.value} (${pct(d.value/tot)})</span></div>`).join('')}</div>
  </div>`;
}
function vbars(data,fmt){
  const max=Math.max(1,...data.map(d=>d.value));
  return `<div class="vbars">`+data.map(d=>
    `<div class="vbar-col" ${d.month?`onclick="setDashMonth('${d.month}')" style="cursor:pointer"`:''}><div class="vbar" style="height:${d.value/max*100}%${d.color?(';background:'+d.color):''}"><div class="v-top">${fmt(d.value)}</div></div><div class="vbar-x">${esc(d.label)}</div></div>`).join('')+`</div>`;
}
/* ----- SVG line/area trend chart (no external lib) ----- */
let _trend=[];
function smoothPath(pts){
  if(pts.length<2)return pts.length?`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`:'';
  let d=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
  }
  return d;
}
function drawTrend(){
  const box=document.getElementById('trendBox'); if(!box)return;
  const data=_trend;
  if(!data.length){ box.innerHTML='<div class="empty-msg">날짜 데이터 없음</div>'; return; }
  const W=Math.max(320,Math.round(box.clientWidth||box.getBoundingClientRect().width||640)), H=250;
  const padL=48,padR=22,padT=28,padB=34, plotW=W-padL-padR, plotH=H-padT-padB;
  const max=Math.max(1,...data.map(d=>+d.value||0)), n=data.length;
  const X=i=>n===1?padL+plotW/2:padL+i*plotW/(n-1);
  const Y=v=>padT+plotH-((+v||0)/max)*plotH;
  const pts=data.map((d,i)=>({x:X(i),y:Y(d.value),d}));
  const line=smoothPath(pts);
  const baseY=padT+plotH;
  const area=line+` L ${pts[n-1].x.toFixed(1)} ${baseY} L ${pts[0].x.toFixed(1)} ${baseY} Z`;
  const grids=[0,.5,1].map(f=>{const y=baseY-f*plotH;return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" class="tc-grid"/><text x="${padL-8}" y="${(y+3).toFixed(1)}" class="tc-yl">${won(max*f)}</text>`;}).join('');
  const dots=pts.map(p=>{const sel=selMonth()&&p.d.month===selMonth();return `<g class="tc-pt" onclick="setDashMonth('${p.d.month}')" style="cursor:pointer"><text x="${p.x.toFixed(1)}" y="${(p.y-13).toFixed(1)}" class="tc-vl ${sel?'sel':''}">${won(p.d.value)}</text><circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${sel?6:4.5}" class="${sel?'tc-dot-sel':'tc-dot'}"/><circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="14" fill="transparent"><title>${esc(p.d.label)} · ${won(p.d.value)}</title></circle><text x="${p.x.toFixed(1)}" y="${H-12}" class="tc-xl ${sel?'sel':''}">${esc(p.d.label)}</text></g>`;}).join('');
  box.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" class="tc-svg" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="tcfill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(9,85,249,.20)"/><stop offset="1" stop-color="rgba(9,85,249,0)"/></linearGradient></defs>
    ${grids}<path d="${area}" fill="url(#tcfill)" class="tc-area"/><path d="${line}" fill="none" class="tc-line"/>${dots}
  </svg>`;
}

function setQuickRange(kind){
  if(kind==='all'){ applyRange('',''); return; }
  const t=todayISO(); const d=new Date(t+'T00:00:00');
  if(kind==='today'){ applyRange(t,t); return; }
  if(kind==='week'){ const wd=(d.getDay()+6)%7; const st=new Date(d); st.setDate(d.getDate()-wd); const en=new Date(st); en.setDate(st.getDate()+6); applyRange(_fmtD(st),_fmtD(en)); return; }
  if(kind==='month'){ const y=d.getFullYear(),m=d.getMonth(); applyRange(_fmtD(new Date(y,m,1)),_fmtD(new Date(y,m+1,0))); return; }
  if(kind==='lastMonth'){ const y=d.getFullYear(),m=d.getMonth(); applyRange(_fmtD(new Date(y,m-1,1)),_fmtD(new Date(y,m,0))); return; }
}
function shiftPeriod(dir){

  if(isFullMonth(dashStart,dashEnd)){ const y=+dashStart.slice(0,4),m=+dashStart.slice(5,7)-1+dir; applyRange(_fmtD(new Date(y,m,1)),_fmtD(new Date(y,m+1,0))); return; }
  const s=new Date((dashStart||dashEnd)+'T00:00:00'), e=new Date((dashEnd||dashStart)+'T00:00:00');
  const span=Math.round((e-s)/86400000)+1; s.setDate(s.getDate()+dir*span); e.setDate(e.getDate()+dir*span); applyRange(_fmtD(s),_fmtD(e));
}

      ds.map(d=>({label:d.name||'(이름없음)',sub:sv(d.service),value:`계약 ${d.ccount||0} · 미팅 1`})), ds.length+'개 신규 딜');

function copyNote(btn){
  const box=btn.closest('.bd-note')&&btn.closest('.bd-note').querySelector('.bd-note-body');
  const txt=box?box.textContent:''; const orig=btn.textContent;
  const done=()=>{ btn.textContent='✓ 복사됨'; setTimeout(()=>{btn.textContent=orig;},1500); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done)); }
  else fallbackCopy(txt,done);
}
function fallbackCopy(txt,cb){ try{ const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); cb&&cb(); }catch(e){} }

const DEAL_COLS=[
  {key:'name',label:'이름',type:'text'},
  {key:'rep',label:'영업자',type:'select',opts:()=>['',...reps()]},
  {key:'service',label:'빌드업(서비스)',type:'select',opts:()=>['',...serviceNames()]},
  {key:'prob',label:'가능성',type:'select',opts:()=>['',...PROBS]},
  {key:'ctype',label:'고객',type:'select',opts:()=>['',...CTYPES]},
  {key:'amount',label:'금액',type:'won'},
  {key:'contract',label:'계약',type:'bool'},
  {key:'ccount',label:'계약수',type:'num'},
  {key:'date',label:'날짜',type:'date'},
];
let flt={q:'',svc:'',reps:[],probs:[],ctypes:[],contract:[]}, sortKey='date', sortDir=-1;
let addOpen=false, _afT;
function filteredDeals(){
  let arr=baseDeals().filter(d=>{
    if(!inPeriod(d.date))return false;
    if(flt.q && !((d.name||'').toLowerCase().includes(flt.q.toLowerCase())))return false;
    if(flt.svc && d.service!==flt.svc)return false;
    if(flt.reps.length && !flt.reps.includes(d.rep||''))return false;
    if(flt.probs.length){ const p=(d.prob&&PROBS.includes(d.prob))?d.prob:'미지정'; if(!flt.probs.includes(p))return false; }
    if(flt.ctypes.length){ const c=(d.ctype==='신규'||d.ctype==='기존')?d.ctype:'미지정'; if(!flt.ctypes.includes(c))return false; }
    if(flt.contract.length){ if(!flt.contract.includes(d.contract?'계약':'미계약'))return false; }
    return true;
  });
  arr.sort((a,b)=>{ let x=a[sortKey],y=b[sortKey];
    if(typeof x==='boolean'){x=x?1:0;y=y?1:0;}
    if(typeof x==='number'||['amount','paid','ccount','meetings'].includes(sortKey)){x=Number(x)||0;y=Number(y)||0; return (x-y)*sortDir;}
    return String(x==null?'':x).localeCompare(String(y==null?'':y),'ko')*sortDir;
  });
  return arr;
}
function cellDisplay(d,col){
  const v=d[col.key];
  if(col.type==='won')return won(v);
  if(col.type==='num')return v||0;
  if(col.type==='bool')return v?`<span class="chip badge-y">✓</span>`:`<span class="badge-n">·</span>`;
  if(col.type==='date')return `<input class="cell-date" type="date" value="${esc(v||'')}" onchange="setDealDate('${d._id}',this.value)" onclick="event.stopPropagation();try{this.showPicker()}catch(e){}">`;
  if(col.key==='prob'&&v)return `<span class="chip" style="color:${probColor(v)}">${esc(v)}</span>`;
  if(col.key==='service')return esc((v||'').replace(/^\d+\.\s*/,''))||'<span class="badge-n">미지정</span>';
  return esc(v)|| (col.type==='text'?'':'<span class="badge-n">—</span>');
}

function refreshTbody(){
  const arr=filteredDeals();
  document.getElementById('dealCnt').textContent=`${arr.length} / ${state.deals.length} 건`;
  document.getElementById('tbody').innerHTML=arr.map(d=>
    `<tr data-id="${d._id}">`+DEAL_COLS.map(c=>{

    }).join('')+`<td class="center"><span class="row-del" onclick="delDeal('${d._id}')" title="삭제">✕</span></td></tr>`).join('');
}
function setSort(k){ if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=1;} renderDeals(document.getElementById('view')); }
function addDeal(){ const d={_id:newId(),name:'새 딜',rep:'',service:'',prob:'',ctype:'신규',amount:0,paid:0,contract:false,ccount:0,meetings:0,date:(dashStart||todayISO()),push:false}; state.deals.unshift(d); logChange('추가','새 딜',''); save(); pushDeal(d); renderDeals(document.getElementById('view')); }
function delDeal(id){ const dd=deal(id); if(!confirm('이 딜을 삭제할까요?'))return; logChange('삭제', dd?dd.name||'(이름없음)':'', ''); state.deals=state.deals.filter(d=>d._id!==id); save(); pushDel(id); refreshTbody(); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function setDealDate(id,val){ const d=deal(id); if(!d)return; const old=d.date||''; if(String(old)===String(val))return; logChange('수정', d.name||'(이름없음)', `날짜: ${old||'—'} → ${val||'—'}`); d.date=val; save(); pushDeal(d); }

function flashAdd(name){ const m=document.getElementById('af-msg'); if(!m)return; m.textContent='✓ '+name+' 추가됨'; m.style.opacity='1'; clearTimeout(_afT); _afT=setTimeout(()=>{m.style.opacity='0';},1800); }

function addAfRow(){ const c=document.getElementById('af-rows'); if(!c)return; c.insertAdjacentHTML('beforeend', afRowHtml()); const rows=c.querySelectorAll('.af-row'); const last=rows[rows.length-1]; const n=last&&last.querySelector('.af-name'); if(n)n.focus(); }
function submitAddDeals(){
  const rows=[...document.querySelectorAll('#af-rows .af-row')];
  let n=0;
  rows.forEach(row=>{
    const q=sel=>row.querySelector(sel);
    const name=(q('.af-name').value||'').trim(); if(!name)return;
    const amount=Math.round(Number(String(q('.af-amount').value||'').replace(/[^\d.-]/g,''))||0);
    const contract=q('.af-contract').value==='1';
    const d={_id:newId(),name:name,rep:q('.af-rep').value||'',service:q('.af-svc').value||'',prob:q('.af-prob').value||'',ctype:q('.af-ctype').value||'신규',amount:amount,paid:0,contract:contract,ccount:contract?1:0,meetings:0,date:q('.af-date').value||'',push:false};
    state.deals.unshift(d);
    logChange('추가', name, (d.service?d.service.replace(/^\d+\.\s*/,'')+' · ':'')+won(amount));

  });

function toggleFilter(el){ const g=el.dataset.grp, v=el.dataset.val; const a=flt[g]; const i=a.indexOf(v); if(el.checked){ if(i<0)a.push(v); } else if(i>=0)a.splice(i,1); refreshTbody(); }
function resetFilters(){ flt.reps=[];flt.probs=[];flt.ctypes=[];flt.contract=[];flt.q='';flt.svc=''; renderDeals(document.getElementById('view')); }

document.addEventListener('click',e=>{
  const td=e.target.closest('td[data-key]'); if(!td)return;
  const col=DEAL_COLS.find(c=>c.key===td.dataset.key); const d=deal(td.dataset.id); if(!col||!d)return;
  if(col.type==='bool'){ const old=d[col.key]; const oldCc=d.ccount; d[col.key]=!d[col.key]; if(col.key==='contract')d.ccount=d.contract?Math.max(1,Number(d.ccount)||0):0; let det=`${col.label}: ${old?'Y':'N'} → ${d[col.key]?'Y':'N'}`; if(col.key==='contract'&&oldCc!==d.ccount)det+=` · 계약수: ${oldCc}→${d.ccount}`; logChange('수정', d.name||'(이름없음)', det); save(); pushDeal(d); refreshTbody(); return; }
  if(td.querySelector('input,select'))return;
  openEditor(td,d,col);
});
function openEditor(td,d,col){
  let ed;
  if(col.type==='select'){
    ed=document.createElement('select'); ed.className='cell-select';
    const opts=col.opts(); ed.innerHTML=opts.map(o=>`<option value="${esc(o)}" ${String(d[col.key]||'')===o?'selected':''}>${o===''?'—':esc(o)}</option>`).join('');
  }else{
    ed=document.createElement('input'); ed.className='cell-input';
    ed.type = (col.type==='won'||col.type==='num')?'number' : col.type==='date'?'date' : 'text';
    ed.value = (col.type==='won'||col.type==='num')?(Number(d[col.key])||0): (d[col.key]||'');
  }
  td.innerHTML=''; td.appendChild(ed); ed.focus(); if(ed.select)try{ed.select()}catch(e){}
  const commit=()=>{
    let val=ed.value;
    if(col.type==='won'||col.type==='num')val=Math.round(Number(String(val).replace(/[^\d.-]/g,''))||0);
    const old=d[col.key];
    if(String(old)!==String(val)) logChange('수정', d.name||'(이름없음)', `${col.label}: ${fmtLog(col,old)} → ${fmtLog(col,val)}`);
    d[col.key]=val; save(); pushDeal(d); td.innerHTML=cellDisplay(d,col);
  };
  ed.addEventListener('blur',commit,{once:true});
  ed.addEventListener('keydown',e=>{ if(e.key==='Enter'){ed.blur();} if(e.key==='Escape'){ed.removeEventListener('blur',commit);td.innerHTML=cellDisplay(d,col);} });
  if(col.type==='select')ed.addEventListener('change',()=>ed.blur());
}

/* ===================== KPI ===================== */
const KPI_CATS=['지원사업','투자유치','브랜딩','개발','기타'];
const CAT_COLOR={'지원사업':'#16b364','투자유치':'#f5a524','브랜딩':'#8b5cf6','개발':'#0955f9','기타':'#9aa3b2'};
function categoryOf(name){
  const n=parseInt(name);
  if(isNaN(n)||n===0)return '기타';
  if(n<=4)return '지원사업';
  if(n<=8)return '투자유치';
  if(n<=12)return '브랜딩';
  if(n<=16)return '개발';
  return '기타';
}
function kpiCard(s,r){
  const x=r[s.name]||{amount:0,camount:0,paid:0,ccount:0,meetings:0,conv:0,deals:0};
  const cc=convColor(x.conv);
  const tm=(s.target||'').match(/(\d+)\s*\/\s*(\d+)/); const tg=tm?Math.min(100,(+tm[1]/(+tm[2]||1))*100):0;
  return `<div class="kpi-card clickable" role="button" tabindex="0" aria-label="${esc(s.name)} 계약·미팅 상세" data-svc="${esc(s.name)}">
    <div class="top">
      <div><div class="nm">${esc(s.name)}</div>${s.price?`<div class="price">💵 ${esc(s.price)}</div>`:''}${s.rr?`<div class="rr">👤 ${esc(s.rr)}</div>`:''}</div>
      <div class="kpi-tr"><button class="kpi-edit" onclick="event.stopPropagation();openServiceEdit('${esc(s._id)}')" title="서비스 수정" aria-label="서비스 수정">✏️ 수정</button><div class="conv-ring" style="background:conic-gradient(${cc} ${x.conv*100}%, #eef1f6 0)"><span style="color:${cc}">${Math.round(x.conv*100)}%</span></div></div>
    </div>
    <div class="kpi-metrics">
      <div class="kpi-metric"><div class="m-v">${x.ccount}</div><div class="m-l">계약수</div></div>
      <div class="kpi-metric"><div class="m-v">${x.meetings}</div><div class="m-l">미팅</div></div>
      <div class="kpi-metric"><div class="m-v" style="font-size:13px">${won(x.camount)}</div><div class="m-l">계약금액</div></div>
    </div>
    ${s.target?`<div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px"><span>월 KPI 목표</span><span style="font-weight:700;color:var(--text)">${esc(s.target)}</span></div><div class="target-bar"><i style="width:${tg}%"></i></div></div>`:''}
    <div style="font-size:11px;color:var(--muted-2)">연결된 딜 ${x.deals}건 · 파이프라인 ${won(x.amount)}</div>
  </div>`;
}
function viewKPI(){
  const r=rollup(periodDeals());
  const groups={}; KPI_CATS.forEach(c=>groups[c]=[]);
  state.services.forEach(s=>{ const c=categoryOf(s.name); (groups[c]=groups[c]||[]).push(s); });
  Object.values(groups).forEach(arr=>arr.sort((a,b)=>{ const na=parseInt(a.name),nb=parseInt(b.name); if(isNaN(na))return 1; if(isNaN(nb))return -1; return na-nb; }));
  const sections=KPI_CATS.filter(c=>groups[c].length).map(c=>{
    const arr=groups[c];
    const csum=arr.reduce((a,s)=>a+((r[s.name]||{}).camount||0),0);
    return `<div class="kpi-cat">
      <div class="kpi-cat-head"><span style="width:10px;height:10px;border-radius:50%;background:${CAT_COLOR[c]};flex-shrink:0"></span><span class="ct">${c}</span><span class="cn">${arr.length}개</span><span class="csum">계약 ${won(csum)}</span></div>
      <div class="kpi-row">${arr.map(s=>kpiCard(s,r)).join('')}</div>
    </div>`;
  }).join('');
  return `<div class="phase-banner">🎯 <span><b>빌드업 서비스</b>를 카테고리로 묶었어요. 카드 클릭=계약·미팅 상세, <b>✏️=수정</b>, 우측 <b>+ 빌드업 추가</b>로 새 서비스 생성. 전환율=계약수÷미팅.</span></div>
  <div class="toolbar" style="margin-bottom:14px"><span class="grow"></span><button class="btn primary" onclick="openServiceEdit(null)">+ 빌드업 추가</button></div>
  ${sections}`;
}

function openServiceEdit(id){
  const s = id ? state.services.find(x=>x._id===id) : null;
  document.getElementById('modalTitle').textContent = s ? '빌드업 수정' : '빌드업 추가';

      <div class="sv-f"><label>서비스명 (앞 번호로 카테고리 분류)</label><input id="sv-name" class="inp" value="${s?esc(s.name):''}" placeholder="예: 17. 신규 서비스"></div>

      <div class="sv-f"><label>비고 · 빌드업 완료 후 안내 멘트 <span class="sv-sub">자유 입력 · 톡 발송용</span></label><textarea id="sv-note" class="inp sv-note" rows="11" placeholder="예) ○○님, 빌드업 완료되었습니다! 결과물 전달드리고, 다음 단계는 …">${s?esc(s.note||''):''}</textarea></div>

      <div class="sv-hint">카테고리: 앞 번호 1~4 지원사업 · 5~8 투자유치 · 9~12 브랜딩 · 13~16 개발 · 그 외 기타. 서비스명을 바꾸면 연결된 딜들도 새 이름으로 함께 갱신됩니다.</div>
    </div>`;
  openModalShell();
  setTimeout(()=>{ const n=document.getElementById('sv-name'); if(n)n.focus(); },0);
}
function saveService(id){
  const g=x=>document.getElementById(x);
  const name=(g('sv-name').value||'').trim();
  if(!name){ alert('서비스명을 입력하세요'); return; }
  const target=(g('sv-target').value||'').trim(), price=(g('sv-price').value||'').trim(), rr=(g('sv-rr').value||'').trim();
  const note=(g('sv-note').value||'').trim();
  if(id){
    const s=state.services.find(x=>x._id===id); if(!s){ closeModal(); return; }
    const oldName=s.name; s.name=name; s.target=target; s.price=price; s.rr=rr; s.note=note;
    if(oldName!==name){ state.deals.forEach(d=>{ if(d.service===oldName){ d.service=name; pushDeal(d); } }); }
    logChange('수정','빌드업: '+name, oldName!==name?('이름 '+oldName+' → '+name):'정보 수정');
    pushService(s);
  } else {
    const s={_id:newSvcId(),name:name,target:target,price:price,rr:rr,note:note,edited:''};
    state.services.push(s);
    logChange('추가','빌드업: '+name,'');
    pushService(s);
  }
  save(); closeModal(); render();
}

function deleteService(id){
  const s=state.services.find(x=>x._id===id); if(!s)return;
  const linked=state.deals.filter(d=>d.service===s.name).length;
  if(!confirm(`'${s.name}' 빌드업을 삭제할까요?`+(linked?`\n연결된 딜 ${linked}건은 '미지정'으로 바뀝니다.`:'')))return;
  if(linked){ state.deals.forEach(d=>{ if(d.service===s.name){ d.service=''; pushDeal(d); } }); }
  state.services=state.services.filter(x=>x._id!==id);
  logChange('삭제','빌드업: '+s.name, linked?`연결 딜 ${linked}건 미지정 처리`:'');
  pushSvcDel(id);
  save(); closeModal(); render();
}

      ${logs.length?`<button class="btn ghost" onclick="exportLogCSV()">📄 로그 CSV</button><button class="btn danger ghost" onclick="clearLog()">로그 비우기</button>`:''}

    ${logs.length?`<div class="tbl-wrap"><table>
      <thead><tr><th>시각</th><th>작업</th><th>사용자</th><th>대상</th><th>변경 내용</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`:'<div class="empty-msg">아직 변경 기록이 없어요. 딜을 수정하면 여기에 쌓입니다.</div>'}

function exportLogCSV(){
  const head=['시각','작업','사용자','대상','변경내용'];
  const rows=(state.logs||[]).map(l=>[l.ts,l.action,l.user,l.target,l.detail].map(v=>{ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }).join(','));
  download('포켓변경로그_'+today()+'.csv','﻿'+head.join(',')+'\n'+rows.join('\n'),'text/csv');
}
function clearLog(){ if(!confirm('변경 로그를 모두 비울까요? (되돌릴 수 없어요)'))return; state.logs=[]; save(); render(); }

let kanField='prob';
const KAN_FIELDS=[{k:'prob',l:'가능성'},{k:'rep',l:'영업자'},{k:'service',l:'빌드업(서비스)'},{k:'ctype',l:'고객종류'}];
function kanCols(){
  if(kanField==='prob')return ['높음','중간','낮음','미지정'];
  if(kanField==='ctype')return ['신규','기존','미지정'];
  if(kanField==='rep')return [...reps(),'미지정'];
  if(kanField==='service')return [...serviceNames().filter(Boolean),'미지정'];
  return ['미지정'];
}
function dealColKey(d){ const v=d[kanField]; return (v && v!=='')?v:'미지정'; }
let dragId=null;
function renderKanban(v){
  const cols=kanCols(); const byCol={}; cols.forEach(c=>byCol[c]=[]);
  periodDeals().forEach(d=>{ const k=dealColKey(d); (byCol[k]=byCol[k]||[]).push(d); });
  const colHtml=Object.keys(byCol).map(c=>{
    const ds=byCol[c]; const sum=ds.reduce((a,b)=>a+(Number(b.amount)||0),0);
    const color = kanField==='prob'?probColor(c):'var(--blue)';
    return `<div class="kcol" data-col="${esc(c)}">
      <div class="kcol-head"><span style="width:9px;height:9px;border-radius:50%;background:${color}"></span>${esc(c.replace(/^\d+\.\s*/,''))}<span class="cnt">${ds.length}</span></div>
      <div style="padding:0 14px 6px"><span class="sum">${won(sum)}</span></div>
      <div class="kcards" data-col="${esc(c)}">${ds.map(d=>kanCard(d)).join('')}</div>
    </div>`;
  }).join('');
  v.innerHTML=`<div class="card" style="background:transparent;border:none;box-shadow:none;padding:0">
    <div class="toolbar"><span style="font-weight:700">그룹 기준:</span>
      ${KAN_FIELDS.map(f=>`<button class="btn ${kanField===f.k?'primary':'ghost'}" onclick="kanField='${f.k}';renderKanban(document.getElementById('view'))">${f.l}</button>`).join('')}
      ${periodActive()?`<span class="active-period">📅 ${periodLabel()}<span class="ap-x" onclick="clearRange()" role="button" tabindex="0" title="기간 해제" aria-label="기간 필터 해제">✕</span></span>`:''}
      <span class="grow"></span><span class="hint" style="margin:0">카드를 다른 칸으로 끌어다 놓으면 값이 바뀌고 자동저장돼요</span>
    </div>
    <div class="kanban">${colHtml}</div>
  </div>`;
  bindKanDnD();
}
function kanCard(d){
  return `<div class="kcard" draggable="true" data-id="${d._id}">
    <div class="knm">${esc(d.name||'(이름없음)')}</div>
    <div class="kmeta">
      <span class="kamt">${won(d.amount)}</span>
      ${d.prob?`<span class="chip" style="color:${probColor(d.prob)}">${esc(d.prob)}</span>`:''}
      ${d.contract?`<span class="chip badge-y">계약</span>`:''}
      <span class="krep">${esc(d.rep||'')}</span>
    </div></div>`;
}
function bindKanDnD(){
  document.querySelectorAll('.kcard').forEach(c=>{
    c.addEventListener('dragstart',e=>{ dragId=c.dataset.id; c.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    c.addEventListener('dragend',()=>{ c.classList.remove('dragging'); document.querySelectorAll('.kcol').forEach(k=>k.classList.remove('drop')); });
  });
  document.querySelectorAll('.kcol').forEach(col=>{
    col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('drop'); });
    col.addEventListener('dragleave',()=>col.classList.remove('drop'));
    col.addEventListener('drop',e=>{
      e.preventDefault(); col.classList.remove('drop'); const d=deal(dragId); if(!d)return;
      let val=col.dataset.col; if(val==='미지정')val='';
      const old=d[kanField]; const flabel=(KAN_FIELDS.find(f=>f.k===kanField)||{}).l||kanField;
      if(String(old)!==String(val)) logChange('이동', d.name||'(이름없음)', `${flabel}: ${old||'(빈값)'} → ${val||'(빈값)'}`);
      d[kanField]=val; save(); pushDeal(d); renderKanban(document.getElementById('view'));
    });
  });
}

/* ===================== CALENDAR ===================== */
let calYM=null;
function defaultYM(){
  const m={}; state.deals.forEach(d=>{ if(d.date)m[d.date.slice(0,7)]=(m[d.date.slice(0,7)]||0)+1; });
  const ks=Object.keys(m).sort(); return ks.length?ks[ks.length-1]:'2026-06';
}
function renderCal(v){
  if(!calYM)calYM=defaultYM();
  const [y,mo]=calYM.split('-').map(Number);
  const first=new Date(y,mo-1,1); const startDow=first.getDay(); const days=new Date(y,mo,0).getDate();
  const byDay={}; baseDeals().forEach(d=>{ if(d.date&&d.date.slice(0,7)===calYM){ const dd=+d.date.slice(8,10); (byDay[dd]=byDay[dd]||[]).push(d); } });
  const dow=['일','월','화','수','목','금','토'];
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let dnum=1;dnum<=days;dnum++){
    const ds=byDay[dnum]||[]; const sum=ds.reduce((a,b)=>a+(Number(b.amount)||0),0);
    const evs=ds.slice(0,3).map(d=>`<div class="cal-ev" title="${esc(d.name)} · ${wonFull(d.amount)}">${esc(d.name)}</div>`).join('');
    cells+=`<div class="cal-cell${ds.length?' cal-click':''}"${ds.length?` onclick="showDayDeals('${calYM}-${String(dnum).padStart(2,'0')}')"`:''}><div class="dnum"><span>${dnum}</span>${ds.length?`<span class="dsum">${won(sum)}</span>`:''}</div>${evs}${ds.length>3?`<div class="cal-more">+${ds.length-3}건 더</div>`:''}</div>`;
  }
  const monthDeals=baseDeals().filter(d=>d.date&&d.date.slice(0,7)===calYM);
  const mAmt=monthDeals.reduce((a,b)=>a+(Number(b.amount)||0),0);
  v.innerHTML=`<div class="card">
    <div class="cal-head">
      <button class="btn ghost" onclick="shiftMonth(-1)">‹ 이전</button>
      <div class="mth">${y}년 ${mo}월</div>
      <button class="btn ghost" onclick="shiftMonth(1)">다음 ›</button>
      <button class="btn ghost" onclick="calYM=defaultYM();renderCal(document.getElementById('view'))">최근</button>
      <span class="grow"></span>
      <span class="pill-cnt">이 달 ${monthDeals.length}건 · ${won(mAmt)}</span>
    </div>
    <div class="cal-grid">${dow.map((d,i)=>`<div class="cal-dow" style="color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--muted)'}">${d}</div>`).join('')}${cells}</div>
    <div class="hint">날짜(빌드업 미팅/계약일) 기준으로 딜을 배치했어요 · 셀당 최대 3건 표시</div>
  </div>`;
}
function shiftMonth(delta){ let[y,m]=calYM.split('-').map(Number); m+=delta; if(m<1){m=12;y--;}if(m>12){m=1;y++;} calYM=`${y}-${String(m).padStart(2,'0')}`; renderCal(document.getElementById('view')); }

/* ===================== IMPORT / EXPORT ===================== */
function download(name,content,type){ const b=new Blob([content],{type}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function exportJSON(){ download('포켓성과관리_'+today()+'.json',JSON.stringify(state,null,2),'application/json'); }
function exportCSV(){
  const cols=DEAL_COLS.map(c=>c.key);
  const head=['이름','영업자','서비스','가능성','고객','금액','계약','계약수','날짜'];
  const rows=state.deals.map(d=>cols.map(k=>{ let v=d[k]; if(typeof v==='boolean')v=v?'Yes':'No'; v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }).join(','));
  download('포켓딜_'+today()+'.csv','﻿'+head.join(',')+'\n'+rows.join('\n'),'text/csv');
}
function importJSON(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{
  const o=JSON.parse(r.result); if(!o.deals)throw 0;
  if(CLOUD){
    if(!confirm('가져온 딜을 시트에 병합할까요?\n같은 _id는 갱신되고, 시트의 다른 항목은 그대로 유지됩니다.'))return;
    const imp=(o.deals||[]).map(normDeal);
    imp.forEach(d=>{ const i=state.deals.findIndex(x=>x._id===d._id); if(i>=0)state.deals[i]=d; else state.deals.unshift(d); pushDeal(d); });
    logChange('가져오기','JSON 병합',`딜 ${imp.length}건`); save(); render(); alert('가져오기(병합) 완료: '+imp.length+'건');
  } else {
    state=o; state.deals.forEach(d=>{ if(!d._id)d._id=newId(); d.amount=Number(d.amount)||0; d.paid=Number(d.paid)||0; d.ccount=Number(d.ccount)||0; d.meetings=Number(d.meetings)||0; d.contract=!!d.contract; d.push=!!d.push; }); state.services=state.services||[]; state.logs=state.logs||[]; logChange('가져오기','JSON 파일 불러옴',`딜 ${state.deals.length}건`); save(); render(); alert('가져오기 완료');
  }
 }catch(err){ alert('불러오기 실패: 올바른 JSON이 아니에요'); } }; r.readAsText(f); e.target.value=''; }
function resetData(){
  if(CLOUD){ if(!confirm('시트에서 데이터를 다시 불러올까요?\n동기화되지 않은 로컬 변경은 사라집니다.'))return; cloudRefresh(); return; }
  if(!confirm('모든 수정을 버리고 노션 원본 데이터로 되돌릴까요? (변경 로그는 보존됩니다)'))return; const keepLogs=state.logs||[]; localStorage.removeItem(LS_KEY); uid=1; state=loadState(); state.logs=keepLogs; logChange('초기화','노션 원본으로 복원',''); save(); render(); }
function today(){ const d=new Date(); return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }

/* ===================== AUTH GATE ===================== */
function updateUserChip(){ const c=document.getElementById('userChip'); if(c)c.textContent='👤 '+(currentUser||'익명'); }
async function showApp(){ document.getElementById('gate').classList.add('hide'); updateUserChip(); renderNav(); render(); if(CLOUD){ await cloudLoad(); render(); } }
function tryUnlock(){
  const pw=document.getElementById('gatePw').value;
  const nm=document.getElementById('gateName').value.trim();
  if(pw!==PASSWORD){
    const card=document.querySelector('.gate-card'); card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    document.getElementById('gateErr').textContent='비밀번호가 올바르지 않습니다'; return;
  }
  currentUser = nm || currentUser || '익명';
  localStorage.setItem(USER_KEY,currentUser);
  localStorage.setItem(AUTH_KEY,'1');
  showApp();
}
function lock(){ localStorage.removeItem(AUTH_KEY); const g=document.getElementById('gate'); g.classList.remove('hide'); document.getElementById('gatePw').value=''; document.getElementById('gateErr').textContent=''; document.getElementById('gatePw').focus(); }
function changeUser(){ const nm=prompt('이름을 입력하세요 (변경 로그에 표시됩니다)', currentUser||''); if(nm===null)return; currentUser=nm.trim()||'익명'; localStorage.setItem(USER_KEY,currentUser); updateUserChip(); }

/* ===================== INIT ===================== */
(function boot(){
  ['gatePw','gateName'].forEach(id=>{ const el=document.getElementById(id); if(el)el.addEventListener('keydown',e=>{ if(e.key==='Enter')tryUnlock(); }); });
  if(currentUser){ const gn=document.getElementById('gateName'); if(gn)gn.value=currentUser; }
  if(localStorage.getItem(AUTH_KEY)==='1'){ showApp(); }
  else { const pw=document.getElementById('gatePw'); if(pw)pw.focus(); }
})();
</script>
